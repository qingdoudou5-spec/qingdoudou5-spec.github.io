  <title>DIE MRI dPEI-#Enzian 璇勫垎鍣?/title>
  <style>
:root {
  --blue: #1f4e79;
  --blue-2: #2f75b5;
  --blue-soft: #eaf3fb;
  --blue-pale: #f6fafe;
  --green: #2e7d32;
  --green-soft: #e7f4e8;
  --orange: #b45309;
  --orange-soft: #fff3d6;
  --purple: #6b46a3;
  --purple-soft: #f0e9ff;
  --red: #b42318;
  --red-soft: #fff1f0;
  --border: #d7dee8;
  --border-strong: #b9c8d8;
  --text: #17202a;
  --muted: #667085;
  --surface: #ffffff;
  --bg: #f4f7fb;
  --shadow: 0 8px 22px rgba(31, 78, 121, .06);
}

* { box-sizing: border-box; }

body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft YaHei", sans-serif;
  color: var(--text);
  background: var(--bg);
}

h1, h2, h3, p { margin: 0; }
h1 { color: var(--blue); font-size: clamp(1.3rem, 3vw, 1.9rem); letter-spacing: .01em; }
h2 { color: var(--blue); font-size: 1.12rem; }
h3 { color: var(--blue); font-size: 1rem; }

.app-header {
  position: sticky;
  top: 0;
  z-index: 10;
  display: flex;
  justify-content: space-between;
  gap: 1rem;
  align-items: center;
  padding: 1rem clamp(1rem, 3vw, 2rem);
  background: rgba(255, 255, 255, .96);
  border-bottom: 1px solid var(--border);
  backdrop-filter: blur(10px);
}

.header-copy p,
.hint,
.case-extra {
  color: var(--muted);
  font-size: .9rem;
  line-height: 1.5;
  margin-top: .2rem;
}

.header-actions,
.queue-actions {
  display: flex;
  flex-wrap: wrap;
  gap: .5rem;
  justify-content: flex-end;
  align-items: center;
}

.header-check {
  display: inline-flex;
  grid-template-columns: auto;
  align-items: center;
  gap: .35rem;
  padding: .45rem .65rem;
  border: 1px solid var(--border);
  border-radius: .65rem;
  background: var(--blue-pale);
  font-size: .9rem;
  white-space: nowrap;
}

.header-check input {
  width: auto;
  margin: 0;
}

button {
  border: 1px solid var(--border);
  border-radius: .65rem;
  background: #fff;
  color: var(--blue);
  font-weight: 750;
  padding: .65rem .9rem;
  min-height: 42px;
  cursor: pointer;
  transition: background .15s ease, border-color .15s ease, color .15s ease, transform .08s ease;
}

button:hover { border-color: var(--blue-2); }
button:active { transform: translateY(1px); }
button.primary { background: var(--blue); color: white; border-color: var(--blue); }
button.ghost { color: #475467; background: #f8fafc; }
button.danger {
  color: var(--red);
  border-color: #fecdca;
  background: var(--red-soft);
  padding: .35rem .55rem;
  min-height: 32px;
}

button:focus-visible,
input:focus-visible,
select:focus-visible,
textarea:focus-visible {
  outline: 3px solid #9cc2e5;
  outline-offset: 2px;
}

.layout {
  display: grid;
  gap: 1rem;
  padding: 1rem clamp(1rem, 3vw, 2rem) 2rem;
  max-width: 1280px;
  margin: 0 auto;
}

.panel {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 1rem;
  padding: 1rem;
  box-shadow: var(--shadow);
}

.section-title {
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: .75rem;
  margin-bottom: .9rem;
}

label {
  display: grid;
  gap: .35rem;
  font-weight: 700;
  color: #344054;
}

input,
select,
textarea {
  width: 100%;
  border: 1px solid var(--border);
  border-radius: .6rem;
  padding: .7rem .75rem;
  font: inherit;
  background: white;
}

textarea { resize: vertical; }

.queue-grid {
  display: grid;
  grid-template-columns: 180px minmax(260px, 1fr) auto;
  gap: .75rem;
  align-items: end;
}

.case-list {
  display: flex;
  flex-wrap: wrap;
  gap: .5rem;
  margin-top: .85rem;
}

.case-chip {
  display: inline-flex;
  align-items: center;
  gap: .45rem;
  min-height: 36px;
  padding: .35rem .6rem;
  font-size: .9rem;
}

.case-chip small {
  border-radius: 999px;
  padding: .12rem .38rem;
  font-size: .75rem;
  font-weight: 800;
}

.case-chip.todo {
  background: #f8fafc;
  color: #475467;
  border-color: #e4e7ec;
}

.case-chip.todo small {
  background: #eef2f6;
  color: #667085;
}

.case-chip.done {
  background: var(--green-soft);
  color: var(--green);
  border-color: #a6d7aa;
}

.case-chip.done small {
  background: #cfead2;
  color: #1f6f2b;
}

.case-chip.draft {
  background: #fff8e8;
  color: var(--orange);
  border-color: #f5d28a;
}

.case-chip.draft small {
  background: var(--orange-soft);
  color: var(--orange);
}

.case-chip.current {
  border: 2px solid var(--blue);
  box-shadow: 0 0 0 3px rgba(47, 117, 181, .12);
}

.pill {
  display: inline-flex;
  align-items: center;
  border-radius: 999px;
  padding: .25rem .6rem;
  background: var(--blue-soft);
  color: var(--blue);
  font-weight: 800;
  white-space: nowrap;
}

.pill.neutral {
  background: #eef2f6;
  color: #475467;
}

.score-card {
  display: flex;
  align-items: center;
  gap: .5rem;
  background: var(--blue-pale);
  border: 1px solid var(--border);
  border-radius: .75rem;
  padding: .45rem .75rem;
}

.score-card strong {
  color: var(--blue);
  font-size: 1.7rem;
  line-height: 1;
}

.dpei-area {
  display: grid;
  grid-template-columns: minmax(280px, 460px) 1fr;
  gap: 1rem;
}

.grid9 {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: .5rem;
}

.tile {
  min-height: 86px;
  display: grid;
  place-items: center;
  text-align: center;
  background: var(--blue-pale);
  border-color: #cfe0ef;
  color: #315f82;
  font-weight: 850;
}

.tile small {
  display: block;
  margin-top: .2rem;
  font-weight: 650;
  color: #6b8195;
  font-size: .72rem;
}

.tile.active {
  background: var(--blue);
  color: white;
  border-color: var(--blue);
}

.tile.active small { color: rgba(255, 255, 255, .85); }

.extra-list {
  display: grid;
  gap: .6rem;
  align-content: start;
}

.extra-button {
  width: 100%;
  display: flex;
  justify-content: space-between;
  align-items: center;
  text-align: left;
  background: #f8fafc;
  color: #475467;
}

.extra-button.active {
  background: #dceef8;
  color: var(--blue);
  border-color: #8bbce0;
}

.extra-button.active strong {
  color: #0f5d8f;
}

.enzian-matrix {
  display: grid;
  grid-template-columns: repeat(2, minmax(0, 1fr));
  gap: .85rem;
}

.enzian-group {
  border: 1px solid #cbd9e8;
  border-radius: .9rem;
  background: #fbfdff;
  padding: .75rem;
}

.group-heading {
  display: inline-flex;
  align-items: center;
  margin-bottom: .65rem;
  padding: .25rem .6rem;
  border-radius: 999px;
  background: var(--blue);
  color: white;
  font-weight: 850;
  letter-spacing: .02em;
}

.enzian-stack {
  display: grid;
  gap: .65rem;
}

.enzian-item,
.f-card,
.standard-box {
  border: 1px solid var(--border);
  border-radius: .8rem;
  padding: .72rem;
  background: #fff;
}

.enzian-title {
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: .5rem;
  margin-bottom: .55rem;
  font-weight: 850;
  color: var(--blue);
}

.segmented {
  display: grid;
  gap: .35rem;
}

.segmented.six { grid-template-columns: repeat(6, 1fr); }
.segmented.four { grid-template-columns: repeat(4, 1fr); }

.choice {
  min-height: 38px;
  padding: .48rem .55rem;
  background: #f8fbfd;
  border-color: #d8e4ef;
  color: #42627f;
}

.choice.positive { background: #edf6ff; color: var(--blue); }
.choice.missing { background: var(--orange-soft); color: var(--orange); border-color: #f5d28a; }
.choice.unknown { background: var(--purple-soft); color: var(--purple); border-color: #d7c4ff; }

.choice.active {
  color: white;
  border-color: var(--blue);
  background: var(--blue);
}

.choice.confirmed-zero.active {
  color: white;
  border-color: var(--green);
  background: var(--green);
}

.choice.missing.active {
  background: var(--orange);
  border-color: var(--orange);
}

.choice.unknown.active {
  background: var(--purple);
  border-color: var(--purple);
}

.choice.compact {
  min-height: 34px;
  padding: .38rem .45rem;
}

.side-row {
  display: grid;
  grid-template-columns: 34px 1fr;
  gap: .4rem;
  align-items: center;
  margin-bottom: .45rem;
}

.side-row:last-child { margin-bottom: 0; }
.side-row strong { color: #475467; }

.standard-box {
  margin-top: .85rem;
  background: var(--blue-pale);
  display: grid;
  gap: .35rem;
}

.enzian-bottom-row {
  display: grid;
  grid-template-columns: minmax(0, 2fr) minmax(260px, .9fr);
  gap: .85rem;
  align-items: stretch;
  margin-top: .85rem;
}

.f-in-enzian {
  border: 1px solid var(--border);
  border-radius: .9rem;
  padding: .8rem;
  background: #fbfdff;
}

.subsection-title {
  display: flex;
  justify-content: space-between;
  gap: .75rem;
  align-items: baseline;
  margin-bottom: .65rem;
}

.note-notch {
  align-self: stretch;
  border: 1px solid #cbd9e8;
  border-left: 6px solid var(--blue);
  border-radius: .9rem;
  padding: .8rem;
  background: #ffffff;
  box-shadow: inset 10px 0 0 rgba(31, 78, 121, .03);
}

code {
  color: var(--blue);
  font-weight: 850;
  white-space: normal;
  word-break: break-word;
}

.f-strip {
  display: grid;
  grid-template-columns: repeat(4, minmax(150px, 1fr));
  gap: .55rem;
}

.f-card {
  background: #fff;
}

.f-card.custom {
  border-color: #b8d5ec;
  background: #fbfdff;
}

.add-f-row {
  display: grid;
  gap: .55rem;
  margin-top: .65rem;
}

.custom-f-controls {
  display: grid;
  grid-template-columns: 110px 1fr 120px auto;
  gap: .5rem;
}

.custom-f-controls[hidden] {
  display: none;
}

.total-note textarea {
  min-height: 76px;
}

.finish-actions {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: .75rem;
  flex-wrap: wrap;
  margin-top: .75rem;
  text-align: center;
}

.large-action {
  min-height: 64px;
  min-width: min(100%, 360px);
  padding-inline: 2rem;
  font-size: 1.22rem;
  border-radius: .9rem;
  box-shadow: 0 10px 24px rgba(31, 78, 121, .18);
}

.shortcut-hint {
  color: var(--muted);
  font-size: .88rem;
  line-height: 1.45;
}

.table-wrap { overflow-x: auto; }

table {
  width: 100%;
  border-collapse: collapse;
  font-size: .92rem;
}

th,
td {
  border-bottom: 1px solid var(--border);
  padding: .65rem;
  text-align: left;
  vertical-align: top;
}

th {
  color: var(--blue);
  background: var(--blue-pale);
  white-space: nowrap;
}

.saved-row {
  background: #fbfffb;
}

.status-done {
  display: inline-flex;
  align-items: center;
  border-radius: 999px;
  padding: .18rem .55rem;
  background: var(--green-soft);
  color: var(--green);
  font-weight: 850;
}

.empty {
  text-align: center;
  color: var(--muted);
  padding: 1.2rem;
}

@media (max-width: 1080px) {
  .f-strip { grid-template-columns: repeat(2, minmax(0, 1fr)); }
}

@media (max-width: 860px) {
  .app-header {
    position: static;
    align-items: flex-start;
    flex-direction: column;
  }

  .header-actions,
  .queue-actions {
    width: 100%;
    justify-content: stretch;
  }

  .header-actions button,
  .queue-actions button {
    flex: 1 1 42%;
  }

  .header-check {
    width: 100%;
  }

  .queue-grid,
  .dpei-area,
  .enzian-matrix,
  .enzian-bottom-row,
  .custom-f-controls {
    grid-template-columns: 1fr;
  }

  .f-strip {
    grid-template-columns: repeat(2, minmax(0, 1fr));
  }

  .segmented.six {
    grid-template-columns: repeat(3, 1fr);
  }

  .tile {
    min-height: 74px;
  }

  .subsection-title {
    display: grid;
  }
}

@media (max-width: 520px) {
  .layout { padding-inline: .75rem; }
  .panel { padding: .85rem; border-radius: .8rem; }
  .section-title { align-items: flex-start; flex-direction: column; }
  .f-strip { grid-template-columns: 1fr; }

  <script>
const dpeiRegions = [
  ["dPEI_AL_L", "宸﹀墠澶栦晶"],
  ["dPEI_AC", "鍓嶄腑澶?],
  ["dPEI_AL_R", "鍙冲墠澶栦晶"],
  ["dPEI_ML_L", "宸︿腑澶栦晶"],
  ["dPEI_MC", "涓腑澶?],
  ["dPEI_ML_R", "鍙充腑澶栦晶"],
  ["dPEI_PL_L", "宸﹀悗澶栦晶"],
  ["dPEI_PC", "鍚庝腑澶?],
  ["dPEI_PL_R", "鍙冲悗澶栦晶"],
];

const dpeiExtras = [
  ["dPEI_pelvic_wall", "鐩嗗/渚ф柟鍙楃疮"],
  ["dPEI_extrapelvic", "鐩嗚厰澶栫梾鐏?],
  ["dPEI_vagina_trigone_ureter", "闃撮亾/鑶€鑳变笁瑙?杈撳翱绠℃墿寮犱换涓€瀛樺湪"],
];

const singleEnzian = {
  P: ["P 鑵硅啘", ["0", "1", "2", "3", "M", "X"]],
  A: ["A 闃撮亾/鐩磋偁闃撮亾闅?瀹鍚庢柟", ["0", "1", "2", "3", "M", "X"]],
  C: ["C 鐩磋偁/涔欑姸缁撹偁", ["0", "1", "2", "3", "M", "X"]],
};

const pairedEnzian = {
  O: ["O 鍗靛发", ["0", "1", "2", "3", "M", "X"]],
  T: ["T 杈撳嵉绠?鍗靛发鍗曞厓/绮樿繛", ["0", "1", "2", "3", "M", "X"]],
  B: ["B 瀹闊у甫/涓婚煣甯?鐩嗕晶澹?, ["0", "1", "2", "3", "M", "X"]],
};

const enzianOrder = ["P", "O", "T", "A", "B", "C"];
const valueSetMain = ["0", "1", "2", "3", "M", "X"];
const valueSetBinary = ["0", "1", "M", "X"];

const commonF = [
  ["FA", "瀛愬鑵鸿倢鐥?, "single"],
  ["FB", "鑶€鑳?, "single"],
  ["FI", "鑲犻亾锛孋鍖轰互涓?, "single"],
  ["FU", "杈撳翱绠?, "paired"],
];

const addableFPresets = [
  ["FW", "鑵瑰/鍒囧彛/鐦㈢棔", "single"],
  ["FG", "鑵硅偂娌?鍦嗛煣甯﹀尯鍩?, "single"],
  ["FD", "鑶堣倢", "single"],
  ["FL", "鑲?鑳歌厰", "single"],
  ["FN", "绁炵粡鍙楃疮", "single"],
];

const outputF = ["FA", "FB", "FI", "FU"];
const NORMAL_ENZIAN_TEXT = "鏈鏄庢樉寮傚父";
const $ = (id) => document.getElementById(id);

const state = {
  queue: [],
  currentIndex: -1,
  records: new Map(),
  drafts: new Map(),
  dpei: {},
  enzianSingle: {},
  enzianPaired: {},
  enzianSingleConfirmed: {},
  enzianPairedConfirmed: {},
  fItems: {},
  customF: [],
  totalNote: "",
};

function makeFItem(code, name, mode) {
  return mode === "paired"
    ? { code, name, mode, left: "0", right: "0", leftConfirmed: false, rightConfirmed: false }
    : { code, name, mode, value: "0", confirmed: false };
}

function emptyFormState() {
  state.dpei = Object.fromEntries([...dpeiRegions, ...dpeiExtras].map(([key]) => [key, 0]));
  state.enzianSingle = Object.fromEntries(Object.keys(singleEnzian).map((key) => [key, "0"]));
  state.enzianPaired = Object.fromEntries(Object.keys(pairedEnzian).map((key) => [key, { left: "0", right: "0" }]));
  state.enzianSingleConfirmed = Object.fromEntries(Object.keys(singleEnzian).map((key) => [key, false]));
  state.enzianPairedConfirmed = Object.fromEntries(Object.keys(pairedEnzian).map((key) => [key, { left: false, right: false }]));
  state.fItems = Object.fromEntries(commonF.map(([code, name, mode]) => [code, makeFItem(code, name, mode)]));
  state.customF = [];
  state.totalNote = "";
}

emptyFormState();

function clone(value) {
  return JSON.parse(JSON.stringify(value));
}

function dpeiTotal() {
  return dpeiRegions.reduce((sum, [key]) => sum + Number(state.dpei[key] || 0), 0);
}

function dpeiGrade(total) {
  if (total <= 2) return "杞诲害";
  if (total <= 4) return "涓害";
  return "閲嶅害";
}

function parseQueueText(text) {
  return text
    .split(/\r?\n/)
    .map((line) => line.trim())
    .filter(Boolean)
    .map((line, index) => {
      const parts = line.includes("\t")
        ? line.split("\t")
        : line.includes(",")
          ? line.split(",")
          : line.split(/\s+/);
      return {
        id: `${parts[0].trim()}__${index + 1}`,
        patientId: parts[0].trim(),
        extras: parts.slice(1).map((part) => part.trim()).filter(Boolean),
      };
    })
    .filter((item) => item.patientId);
}

function loadQueue() {
  const items = parseQueueText($("pasteBox").value);
  if (!items.length) {
    alert("璇峰厛绮樿创鑷冲皯涓€涓偅鑰?ID銆?);
    return;
  }
  state.queue = items;
  state.currentIndex = 0;
  state.records.clear();
  state.drafts.clear();
  emptyFormState();
  renderAll();
}

function currentCase() {
  return state.queue[state.currentIndex] || null;
}

function currentKey() {
  const item = currentCase();
  return item ? `${item.id}__${$("readerSelect").value}` : "";
}

function valueClass(value) {
  if (value === "M") return "missing";
  if (value === "X") return "unknown";
  if (value !== "0") return "positive";
  return "zero";
}

function setValueButton(container, values, current, confirmed, onChange, compact = false) {
  container.innerHTML = "";
  values.forEach((value) => {
    const btn = document.createElement("button");
    btn.type = "button";
    btn.textContent = value;
    btn.className = [
      "choice",
      valueClass(value),
      current === value && confirmed ? "active" : "",
      value === "0" && current === value && confirmed ? "confirmed-zero" : "",
      compact ? "compact" : "",
    ].filter(Boolean).join(" ");
    btn.addEventListener("click", () => {
      if (current === value && confirmed) onChange("0", false);
      else onChange(value, true);
    });
    container.appendChild(btn);
  });
}

function renderDpei() {
  const grid = $("dpeiGrid");
  grid.innerHTML = "";
  dpeiRegions.forEach(([key, label]) => {
    const btn = document.createElement("button");
    btn.type = "button";
    btn.className = `tile ${state.dpei[key] ? "active" : ""}`;
    btn.innerHTML = `<span>${label}</span><small>${key}</small>`;
    btn.addEventListener("click", () => {
      state.dpei[key] = state.dpei[key] ? 0 : 1;
      renderDpei();
      updateDpeiScore();
    });
    grid.appendChild(btn);
  });

  const extras = $("dpeiExtras");
  extras.innerHTML = "";
  dpeiExtras.forEach(([key, label]) => {
    const btn = document.createElement("button");
    btn.type = "button";
    btn.className = `extra-button ${state.dpei[key] ? "active" : ""}`;
    btn.innerHTML = `<span>${label}</span><strong>${state.dpei[key] ? "1 鏈? : "0 鏃?}</strong>`;
    btn.addEventListener("click", () => {
      state.dpei[key] = state.dpei[key] ? 0 : 1;
      renderDpei();
    });
    extras.appendChild(btn);
  });
}

function updateDpeiScore() {
  const total = dpeiTotal();
  $("dpeiTotal").textContent = String(total);
  $("dpeiGrade").textContent = dpeiGrade(total);
}

function renderEnzian() {
  renderEnzianColumn("enzianLeft", ["P", "O", "T"]);
  renderEnzianColumn("enzianRight", ["A", "B", "C"]);
  renderStandard();
}

function renderEnzianColumn(rootId, codes) {
  const root = $(rootId);
  root.innerHTML = "";
  codes.forEach((code) => {
    const item = document.createElement("div");
    item.className = `enzian-item enzian-${code}`;
    if (singleEnzian[code]) {
      const [label, values] = singleEnzian[code];
      item.innerHTML = `
        <div class="enzian-title"><span>${label}</span><span>${code}</span></div>
        <div class="segmented six" data-seg="${code}"></div>
      `;
      root.appendChild(item);
      setValueButton(item.querySelector("[data-seg]"), values, state.enzianSingle[code], state.enzianSingleConfirmed[code], (value, confirmed) => {
        state.enzianSingle[code] = value;
        state.enzianSingleConfirmed[code] = confirmed;
        renderEnzian();
      });
      return;
    }

    const [label, values] = pairedEnzian[code];
    item.innerHTML = `
      <div class="enzian-title"><span>${label}</span><span>${code} 宸?鍙?/span></div>
      <div class="side-row"><strong>宸?/strong><div class="segmented six" data-left="${code}"></div></div>
      <div class="side-row"><strong>鍙?/strong><div class="segmented six" data-right="${code}"></div></div>
    `;
    root.appendChild(item);
    setValueButton(item.querySelector("[data-left]"), values, state.enzianPaired[code].left, state.enzianPairedConfirmed[code].left, (value, confirmed) => {
      state.enzianPaired[code].left = value;
      state.enzianPairedConfirmed[code].left = confirmed;
      renderEnzian();
    });
    setValueButton(item.querySelector("[data-right]"), values, state.enzianPaired[code].right, state.enzianPairedConfirmed[code].right, (value, confirmed) => {
      state.enzianPaired[code].right = value;
      state.enzianPairedConfirmed[code].right = confirmed;
      renderEnzian();
    });
  });
}

function renderFItems() {
  const root = $("fGrid");
  root.innerHTML = "";
  Object.values(state.fItems).forEach((item) => root.appendChild(renderFCard(item, false)));
  state.customF.forEach((item) => root.appendChild(renderFCard(item, true)));
}

function renderFCard(item, isCustom) {
  const card = document.createElement("div");
  card.className = `f-card ${isCustom ? "custom" : ""}`;
  const controls = item.mode === "paired"
    ? `
      <div class="side-row f-side"><strong>宸?/strong><div class="segmented four" data-f-left="${item.code}"></div></div>
      <div class="side-row f-side"><strong>鍙?/strong><div class="segmented four" data-f-right="${item.code}"></div></div>
    `
    : `<div class="segmented four" data-f-value="${item.code}"></div>`;

  card.innerHTML = `
    <div class="enzian-title">
      <span>${item.code} ${escapeHtml(item.name)}</span>
      ${isCustom ? `<button type="button" class="danger" data-delete-f="${item.code}">鍒犻櫎</button>` : ""}
    </div>
    ${controls}
  `;

  if (item.mode === "paired") {
    setValueButton(card.querySelector("[data-f-left]"), valueSetBinary, item.left, item.leftConfirmed, (value, confirmed) => {
      item.left = value;
      item.leftConfirmed = confirmed;
      renderFItems();
      renderStandard();
    }, true);
    setValueButton(card.querySelector("[data-f-right]"), valueSetBinary, item.right, item.rightConfirmed, (value, confirmed) => {
      item.right = value;
      item.rightConfirmed = confirmed;
      renderFItems();
      renderStandard();
    }, true);
  } else {
    setValueButton(card.querySelector("[data-f-value]"), valueSetBinary, item.value, item.confirmed, (value, confirmed) => {
      item.value = value;
      item.confirmed = confirmed;
      renderFItems();
      renderStandard();
    }, true);
  }

  const del = card.querySelector("[data-delete-f]");
  if (del) {
    del.addEventListener("click", () => {
      state.customF = state.customF.filter((x) => x.code !== item.code);
      renderFItems();
      renderStandard();
    });
  }
  return card;
}

function addCustomF() {
  const code = $("customFCode").value.trim().toUpperCase();
  const name = $("customFName").value.trim();
  const mode = $("customFPaired").value;
  if (!/^F[A-Z0-9]{1,3}$/.test(code)) {
    alert("F 浠ｇ爜闇€浠?F 寮€澶达紝渚嬪 FS銆丗W銆丗D銆?);
    return;
  }
  if (!name) {
    alert("璇峰～鍐欓儴浣嶅悕绉般€?);
    return;
  }
  if (state.fItems[code] || state.customF.some((item) => item.code === code)) {
    alert("璇?F 浠ｇ爜宸插瓨鍦ㄣ€?);
    return;
  }
  state.customF.push(makeFItem(code, name, mode));
  $("customFCode").value = "";
  $("customFName").value = "";
  $("addFPreset").value = "";
  $("customFControls").hidden = true;
  renderFItems();
  renderStandard();
}

function addPresetF(code) {
  const preset = addableFPresets.find(([presetCode]) => presetCode === code);
  if (!preset) return;
  const [presetCode, name, mode] = preset;
  if (state.fItems[presetCode] || state.customF.some((item) => item.code === presetCode)) {
    alert("璇?F 绫婚儴浣嶅凡娣诲姞銆?);
    $("addFPreset").value = "";
    return;
  }
  state.customF.push(makeFItem(presetCode, name, mode));
  $("addFPreset").value = "";
  $("customFControls").hidden = true;
  renderFItems();
  renderStandard();
}

function handleAddFPreset() {
  const value = $("addFPreset").value;
  if (!value) {
    $("customFControls").hidden = true;
    return;
  }
  if (value === "CUSTOM") {
    $("customFControls").hidden = false;
    $("customFCode").focus();
    return;
  }
  addPresetF(value);
}

function formatSingle(code, value) {
  return value === "0" ? "" : `${code}${value}`;
}

function formatPaired(code, value) {
  const left = value.left || "0";
  const right = value.right || "0";
  return left === "0" && right === "0" ? "" : `${code}${left}/${right}`;
}

function formatF(item) {
  if (item.mode === "paired") return formatPaired(item.code, item);
  if (item.value === "0") return "";
  if (item.value === "1") return item.code;
  return `${item.code}${item.value}`;
}

function standardEnzian(recordLike = state) {
  const parts = [];
  enzianOrder.forEach((code) => {
    const output = recordLike.enzianPaired[code]
      ? formatPaired(code, recordLike.enzianPaired[code])
      : formatSingle(code, recordLike.enzianSingle[code]);
    if (output) parts.push(output);
  });
  [...Object.values(recordLike.fItems), ...recordLike.customF].forEach((item) => {
    const output = formatF(item);
    if (output) parts.push(output);
  });
  return parts.length ? `#ENZIAN: ${parts.join(", ")}` : NORMAL_ENZIAN_TEXT;
}

function customFSummary(recordLike = state) {
  return recordLike.customF.map((item) => {
    const value = item.mode === "paired" ? `${item.left}/${item.right}` : item.value;
    return `${item.code}:${item.name}=${value}`;
  }).join("; ");
}

function renderStandard() {
  $("standardOutput").textContent = standardEnzian();
}

function captureNote() {
  state.totalNote = $("totalNote").value.trim();
}

function currentRecord() {
  const item = currentCase();
  if (!item) {
    alert("璇峰厛鐢熸垚鐥呬緥闃熷垪銆?);
    return null;
  }
  const reader = $("readerSelect").value;
  const total = dpeiTotal();
  return {
    key: currentKey(),
    patientId: item.patientId,
    caseExtras: item.extras,
    reader,
    dpeiTotal: total,
    dpeiGrade: dpeiGrade(total),
    standardEnzian: standardEnzian(),
    customF: customFSummary(),
    totalNote: state.totalNote,
    dpei: clone(state.dpei),
    enzianSingle: clone(state.enzianSingle),
    enzianPaired: clone(state.enzianPaired),
    enzianSingleConfirmed: clone(state.enzianSingleConfirmed),
    enzianPairedConfirmed: clone(state.enzianPairedConfirmed),
    fItems: clone(state.fItems),
    customFItems: clone(state.customF),
  };
}

function saveCurrent() {
  captureNote();
  const record = currentRecord();
  if (!record) return null;
  state.records.set(record.key, record);
  state.drafts.delete(record.key);
  renderQueue();
  renderRecords();
  return record;
}

function stashDraft() {
  if (!currentCase()) return;
  captureNote();
  const record = currentRecord();
  if (!record) return;
  if (state.records.has(record.key)) return;
  state.drafts.set(record.key, record);
}

function saveCurrentAndNext() {
  const record = saveCurrent();
  if (!record) return;
  if (state.currentIndex < state.queue.length - 1) {
    state.currentIndex += 1;
    loadCurrentIfSaved();
    renderAll();
  } else {
    alert("宸蹭繚瀛橈紝褰撳墠宸茬粡鏄渶鍚庝竴渚嬨€?);
    renderAll();
  }
}

function loadRecord(record) {
  state.dpei = clone(record.dpei);
  state.enzianSingle = clone(record.enzianSingle);
  state.enzianPaired = clone(record.enzianPaired);
  state.enzianSingleConfirmed = clone(record.enzianSingleConfirmed || Object.fromEntries(Object.keys(singleEnzian).map((key) => [key, false])));
  state.enzianPairedConfirmed = clone(record.enzianPairedConfirmed || Object.fromEntries(Object.keys(pairedEnzian).map((key) => [key, { left: false, right: false }])));
  state.fItems = clone(record.fItems);
  state.customF = clone(record.customFItems);
  state.totalNote = record.totalNote || "";
  $("totalNote").value = state.totalNote;
  renderScoring();
}

function resetCurrentForm(render = true) {
  emptyFormState();
  $("totalNote").value = "";
  if (render) renderScoring();
}

function loadCurrentIfSaved() {
  const saved = state.records.get(currentKey());
  const draft = state.drafts.get(currentKey());
  if (saved) loadRecord(saved);
  else if (draft) loadRecord(draft);
  else resetCurrentForm(false);
}

function go(delta) {
  if (!state.queue.length) return;
  stashDraft();
  state.currentIndex = Math.max(0, Math.min(state.queue.length - 1, state.currentIndex + delta));
  loadCurrentIfSaved();
  renderAll();
}

function renderQueue() {
  const list = $("caseList");
  list.innerHTML = "";
  state.queue.forEach((item, index) => {
    const key = `${item.id}__${$("readerSelect").value}`;
    const isCurrent = index === state.currentIndex;
    const isDone = state.records.has(key);
    const btn = document.createElement("button");
    btn.type = "button";
    const isDraft = !isDone && state.drafts.has(key);
    btn.className = ["case-chip", isCurrent ? "current" : "", isDone ? "done" : isDraft ? "draft" : "todo"].filter(Boolean).join(" ");
    btn.innerHTML = `<span>${index + 1}. ${escapeHtml(item.patientId)}</span><small>${isDone ? "宸蹭繚瀛? : isDraft ? "缂栬緫涓? : "鏈瘎鍒?}</small>`;
    btn.addEventListener("click", () => {
      stashDraft();
      state.currentIndex = index;
      loadCurrentIfSaved();
      renderAll();
    });
    list.appendChild(btn);
  });
  const done = state.queue.filter((item) => state.records.has(`${item.id}__${$("readerSelect").value}`)).length;
  $("progressText").textContent = `${done}/${state.queue.length} 宸茶瘎鍒哷;
}

function renderCurrentCase() {
  const item = currentCase();
  $("currentCaseText").textContent = item ? `${state.currentIndex + 1}/${state.queue.length}锛?{item.patientId}` : "鏈€夋嫨";
  $("caseExtraText").textContent = item && item.extras.length ? `闄勫姞淇℃伅锛?{item.extras.join(" | ")}` : "鏃犻檮鍔犱俊鎭?;
}

function renderRecords() {
  const body = $("recordsBody");
  body.innerHTML = "";
  const records = [...state.records.values()];
  $("savedCount").textContent = `${records.length} 鏉;
  if (!records.length) {
    body.innerHTML = `<tr><td colspan="6" class="empty">杩樻病鏈変繚瀛樿瘎鍒嗐€?/td></tr>`;
    return;
  }
  records.forEach((record) => {
    const tr = document.createElement("tr");
    tr.className = "saved-row";
    tr.innerHTML = `
      <td>${escapeHtml(record.patientId)}</td>
      <td>${record.reader}</td>
      <td>${record.dpeiTotal} / ${record.dpeiGrade}</td>
      <td><code>${escapeHtml(record.standardEnzian)}</code></td>
      <td><span class="status-done">宸蹭繚瀛?/span></td>
      <td><button type="button" data-copy="${record.key}">澶嶅埗</button></td>
    `;
    body.appendChild(tr);
  });
  body.querySelectorAll("[data-copy]").forEach((btn) => {
    btn.addEventListener("click", () => copyRecords([state.records.get(btn.dataset.copy)]));
  });
}

function renderScoring() {
  renderDpei();
  renderEnzian();
  renderFItems();
  updateDpeiScore();
  renderStandard();
  $("totalNote").value = state.totalNote;
}

function renderAll() {
  renderCurrentCase();
  renderQueue();
  renderScoring();
  renderRecords();
}

function outputColumns() {
  const reader = $("readerSelect").value;
  const cols = [
    "鎮ｈ€匢D",
    "闃呯墖鑰?,
    "鐥呬緥闄勫姞淇℃伅",
    ...dpeiRegions.map(([key]) => `${key}_${reader}`),
    ...dpeiExtras.map(([key]) => `${key}_${reader}`),
    `dPEI鎬诲垎_${reader}`,
    `dPEI鍒嗙骇_${reader}`,
  ];
  enzianOrder.forEach((code) => cols.push(`Enzian_${code}_${reader}`));
  outputF.forEach((code) => cols.push(`Enzian_${code}_${reader}`));
  cols.push(`Enzian_standard_${reader}`, `Enzian_custom_F_${reader}`, `鎬诲娉╛${reader}`);
  return cols;
}

function enzianValue(record, code) {
  if (record.enzianPaired[code]) return `${record.enzianPaired[code].left}/${record.enzianPaired[code].right}`;
  return record.enzianSingle[code] || "0";
}

function fValue(record, code) {
  const item = record.fItems[code];
  if (!item) return "";
  if (item.mode === "paired") return `${item.left}/${item.right}`;
  return item.value;
}

function recordRow(record) {
  const row = [record.patientId, record.reader, record.caseExtras.join(" | ")];
  dpeiRegions.forEach(([key]) => row.push(record.dpei[key] ?? ""));
  dpeiExtras.forEach(([key]) => row.push(record.dpei[key] ?? ""));
  row.push(record.dpeiTotal, record.dpeiGrade);
  enzianOrder.forEach((code) => row.push(enzianValue(record, code)));
  outputF.forEach((code) => row.push(fValue(record, code)));
  row.push(record.standardEnzian, record.customF || "", record.totalNote || "");
  return row;
}

function tsv(rows) {
  return rows
    .map((row) => row.map((cell) => String(cell ?? "").replace(/\t/g, " ").replace(/\r?\n/g, " ")).join("\t"))
    .join("\n");
}

async function copyText(text) {
  try {
    await navigator.clipboard.writeText(text);
  } catch {
    const box = document.createElement("textarea");
    box.value = text;
    document.body.appendChild(box);
    box.select();
    document.execCommand("copy");
    box.remove();
  }
  alert("宸插鍒讹紝鍙互鐩存帴绮樿创鍒?Excel銆?);
}

function copyRecords(records) {
  const valid = records.filter(Boolean);
  if (!valid.length) {
    alert("娌℃湁鍙鍒剁殑璇勫垎璁板綍銆?);
    return;
  }
  const rows = valid.map(recordRow);
  if ($("includeHeader").checked) rows.unshift(outputColumns());
  copyText(tsv(rows));
}

function copyCurrent() {
  const record = saveCurrent();
  if (record) copyRecords([record]);
}

function copyScored() {
  copyRecords([...state.records.values()]);
}

function isTypingTarget(target) {
  if (!target) return false;
  const tag = target.tagName;
  return tag === "INPUT" || tag === "TEXTAREA" || tag === "SELECT" || target.isContentEditable;
}

function handleKeydown(event) {
  if (event.ctrlKey && event.key.toLowerCase() === "s") {
    event.preventDefault();
    saveCurrent();
    return;
  }
  if (event.ctrlKey && event.key === "Enter") {
    event.preventDefault();
    saveCurrentAndNext();
    return;
  }
  if (isTypingTarget(event.target)) return;
  if (event.altKey && event.key === "ArrowLeft") {
    event.preventDefault();
    go(-1);
  }
  if (event.altKey && event.key === "ArrowRight") {
    event.preventDefault();
    go(1);
  }
}

function handleMouseDown(event) {
  if (event.button !== 1 || isTypingTarget(event.target)) return;
  const main = document.querySelector("main");
  if (!main || !main.contains(event.target)) return;
  event.preventDefault();
  saveCurrentAndNext();
}

function escapeHtml(value) {
  return String(value ?? "")
    .replaceAll("&", "&amp;")
    .replaceAll("<", "&lt;")
    .replaceAll(">", "&gt;")
    .replaceAll('"', "&quot;");
}

function bind() {
  $("loadQueueBtn").addEventListener("click", loadQueue);
  $("prevBtn").addEventListener("click", () => go(-1));
  $("nextBtn").addEventListener("click", () => go(1));
  $("saveBtn").addEventListener("click", saveCurrent);
  $("saveNextBtn").addEventListener("click", saveCurrentAndNext);
  $("copyCurrentBtn").addEventListener("click", copyCurrent);
  $("copyScoredBtn").addEventListener("click", copyScored);
  $("resetBtn").addEventListener("click", () => resetCurrentForm(true));
  $("addFPreset").addEventListener("change", handleAddFPreset);
  $("addCustomFBtn").addEventListener("click", addCustomF);
  $("readerSelect").addEventListener("change", () => {
    loadCurrentIfSaved();
    renderAll();
  });
  $("totalNote").addEventListener("input", () => {
    state.totalNote = $("totalNote").value;
  });
  document.addEventListener("keydown", handleKeydown);
  document.addEventListener("mousedown", handleMouseDown);
}

bind();
renderAll();

  </script>
</body>
</html>
